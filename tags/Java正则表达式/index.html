  <div class="post-list"><article class="post-card"><div class="post-meta"><time datetime="2020-02-11T10:16:31.000Z">2020/02/11</time><span><a href="/tags/Java正则表达式/">Java正则表达式</a></span></div><h2><a href="/2020/02/11/正则表达式/">正则表达式</a></h2><p>1.1 什么是正则表达式正则表达式定义了字符串的模式。 正则表达式可以用来搜索、编辑或处理文本。 正则表达式并不仅限于某一种语言，但是在每种语言中有细微的差别。 1.2 正则表达式的编写规则1.2.1 常见匹配符号 正则表达式 描述 . 匹配所有单个字符，除换行符。 ^regex 正则必须匹配字符串</p></article></div>
